workflows:
  default-workflow:
    name: Build Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Generate iOS project files if missing
        script: |
          [ -d ios/Runner.xcodeproj ] || flutter create --platforms=ios .
      - name: Remove Windows-generated xcconfig
        script: |
          rm -f ios/Flutter/Generated.xcconfig
      - name: Set minimum iOS version to 15.0
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13\.0;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj || true
      - name: Configure build settings for unsigned build
        script: |
          ruby -e "
            content = File.read('ios/Runner.xcodeproj/project.pbxproj')
            content.gsub!(/buildSettings = \{/) { |m| \"\#{m}\n\t\t\t\tDEVELOPMENT_TEAM = \"\";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"\";\" }
            File.write('ios/Runner.xcodeproj/project.pbxproj', content)
          "
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Install Pods
        script: |
          cd ios && pod install
      - name: Build iOS Unsigned IPA
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
