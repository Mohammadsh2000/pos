workflows:
  default-workflow:
    name: Build Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - production_keys
    triggering:
      events:
        - push
    scripts:
      - name: Create .env from CI secrets
        script: |
          if [ ! -f .env ]; then
            echo "FIREBASE_IOS_API_KEY=$FIREBASE_IOS_API_KEY" > .env
            echo "FIREBASE_IOS_APP_ID=$FIREBASE_IOS_APP_ID" >> .env
            echo "FIREBASE_IOS_CLIENT_ID=$FIREBASE_IOS_CLIENT_ID" >> .env
            echo "FIREBASE_IOS_BUNDLE_ID=$FIREBASE_IOS_BUNDLE_ID" >> .env
            echo "FIREBASE_WEB_MESSAGING_SENDER_ID=$FIREBASE_WEB_MESSAGING_SENDER_ID" >> .env
            echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env
            echo "FIREBASE_DATABASE_URL=$FIREBASE_DATABASE_URL" >> .env
            echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env
            echo "FIREBASE_ANDROID_CLIENT_ID=$FIREBASE_ANDROID_CLIENT_ID" >> .env
            echo "GOOGLE_SERVER_CLIENT_ID=$GOOGLE_SERVER_CLIENT_ID" >> .env
            echo ".env created from CI secrets"
          fi
      - name: Remove Windows-generated xcconfig
        script: |
          rm -f ios/Flutter/Generated.xcconfig ios/Flutter/flutter_export_environment.sh
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Build iOS Unsigned IPA
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
