workflows:
  default-workflow:
    name: Build Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Set up local properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Remove Windows-generated xcconfig
        script: |
          rm -f ios/Flutter/Generated.xcconfig
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      - name: Install Pods
        script: |
          cd ios && pod install
      - name: Build iOS Unsigned IPA
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
